[toolchain]
anchor_version = "0.30.1"
solana_version = "1.18.26"

[features]
resolution = true
skip-lint = false

[programs.localnet]
traxis_vault = "E77R7yqUEAWz9jUk92kSnrpvUBEwGpPT3iZaThbKQcJb"
traxis_ppn   = "4NnrpeWgdmVymcdGqbrmQUunHHvyVSevUXCKFGJYwbtE"

[programs.devnet]
# IDs match the keypairs in target/deploy/ as of phase-14 deploy.
traxis_vault = "E77R7yqUEAWz9jUk92kSnrpvUBEwGpPT3iZaThbKQcJb"
traxis_ppn   = "4NnrpeWgdmVymcdGqbrmQUunHHvyVSevUXCKFGJYwbtE"

[programs.testnet]
# Testnet deployment uses the current target/deploy/*-keypair.json pubkeys.
# These differ from devnet because the E77R7/4Nnrpe keypairs used for the
# devnet deploy at commit 33d2edd are no longer on this machine; only the
# older DY7NA/3wDHsr keypairs survived in target/deploy/. declare_id in
# programs/*/src/lib.rs was updated to match so testnet builds run correctly.
traxis_vault = "DY7NAimrQZY7SxveXTb38XN7H69wAXjZZj8DRHto4Aat"
traxis_ppn   = "3wDHsr9EnWkF968zYmSsj4hShNkAyFV6r7zxPrjqWNsp"

[registry]
url = "https://api.apr.dev"

[provider]
# Default is still devnet so `anchor deploy` / `anchor test` keep working
# unchanged. Testnet deploys pass `--provider.cluster testnet` explicitly
# (see DEPLOY-TO-TESTNET.command).
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test.validator]
url = "https://api.devnet.solana.com"
